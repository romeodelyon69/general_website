version: '3.9'

services:
  # ── Express API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data   # Persist JSON data files on the NAS
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
    # Backend is NOT exposed publicly — only accessible by the frontend container

  # ── React frontend (nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:80"      # Access via http://<NAS-IP>:8080
    depends_on:
      - backend
